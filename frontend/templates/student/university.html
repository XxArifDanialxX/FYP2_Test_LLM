{% extends "base.html" %}
{% block content %}
<style>
    /* Add specific style for the dropdowns */
    select {
        width: 100%;
        padding: 10px;
        margin: 5px 0 20px 0;
        border: 1px solid #ced4da;
        border-radius: 4px;
        background-color: white;
        font-size: 16px;
    }
</style>

<h2><i class="fas fa-university"></i> Previous Semester Results</h2>
<p>Please select your grade for each subject.</p>

<form method="POST">
    <!-- DYNAMIC LOOP -->
    {% for sub in subjects %}
    <div style="margin-bottom: 15px;">
        <label><strong>{{ sub.replace('_', ' ') }}</strong></label>
        
        <select name="{{ sub }}" required>
            <option value="" disabled selected>Select Grade</option>
            <option value="A">A</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B">B</option>
            <option value="B-">B-</option>
            <option value="C+">C+</option>
            <option value="C">C</option>
            <option value="C-">C-</option>
            <option value="D">D</option>
            <option value="F">F (Fail)</option>
            <option value="0">Not Taken</option>
        </select>
    </div>
    {% endfor %}
    
    <div style="text-align: right; margin-top: 20px;">
        <button type="submit" class="btn btn-student">Next: Technical Skills <i class="fas fa-arrow-right"></i></button>
    </div>
</form>
{% endblock %}
